<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETABS 梁自動編號工具</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- 淺色主題 --- */
        :root {
            --theme-bg: #f1f5f9; 
            --theme-surface: #ffffff; 
            --theme-border: #e2e8f0; 
            --theme-shadow: rgba(0, 0, 0, 0.05);
            --theme-text-primary: #1e293b; 
            --theme-text-secondary: #64748b; 
            --theme-accent: #f97316; 
            --theme-accent-hover: #ea580c;
            --theme-success: #22c55e;
            --theme-success-hover: #16a34a;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body { 
            font-family: 'Inter', 'Microsoft JhengHei', sans-serif; 
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px; 
            color: var(--theme-text-primary); 
            background-color: var(--theme-bg);
            position: relative;
        }
        #container { 
            width: 90%; max-width: 1200px; 
            background: var(--theme-surface);
            padding: 30px; border-radius: 18px; 
            border: 1px solid var(--theme-border);
            box-shadow: 0 10px 25px -5px var(--theme-shadow), 0 8px 10px -6px var(--theme-shadow);
            animation: fadeIn 0.8s ease-out forwards;
            position: relative; z-index: 1;
        }
        h1 {
            font-size: 2.25rem; font-weight: 700; color: var(--theme-text-primary);
            text-align: center; margin-bottom: 2.5rem; position: relative;
        }
        h1::after {
            content: ''; position: absolute; bottom: -10px; left: 50%;
            transform: translateX(-50%); width: 80px; height: 3px;
            background: var(--theme-accent);
            border-radius: 2px;
        }
        h3 { 
            color: var(--theme-text-primary); font-weight: 500;
            border-bottom: 1px solid var(--theme-border);
            padding-bottom: 0.5rem; margin-bottom: 1rem; opacity: 0.9;
        }
        .controls { 
            margin-bottom: 25px; padding: 20px; border-radius: 12px;
            display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
            background: var(--theme-bg); border: 1px solid var(--theme-border);
        }
        label { font-weight: 500; color: var(--theme-text-secondary); }
        input[type="file"]::file-selector-button {
            background-color: #ffffff; color: var(--theme-text-secondary);
            border: 1px solid var(--theme-border); padding: 8px 15px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: var(--theme-bg); border-color: var(--theme-accent);
            color: var(--theme-accent);
        }
        select {
            background-color: #ffffff; color: var(--theme-text-primary);
            border: 1px solid var(--theme-border); padding: 8px 15px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
        }
        select:hover {
             border-color: var(--theme-accent);
        }
        select option {
            background-color: #ffffff;
            color: #000000;
        }
        button { 
            padding: 12px 24px; color: white; border: none; border-radius: 10px;
            cursor: pointer; font-size: 16px; font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-process { background-color: var(--theme-accent); }
        .btn-process:hover { background-color: var(--theme-accent-hover); }
        .btn-export { background-color: var(--theme-success); }
        .btn-export:hover { background-color: var(--theme-success-hover); }
        .btn-export:disabled { background-color: #9ca3af; cursor: not-allowed; }
        #output { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        
        /* --- [修改 1] 調整寬度比例 --- */
        #drawing {
            flex: 7; /* 70% 寬度 */
            min-width: 300px; padding: 20px; max-height: 65vh; overflow: auto;
            border-radius: 12px; background: #ffffff;
            border: 1px solid var(--theme-border);
        }
        #results-table {
            flex: 3; /* 30% 寬度 */
            min-width: 250px; padding: 20px; max-height: 65vh; overflow: auto;
            border-radius: 12px; background: #ffffff;
            border: 1px solid var(--theme-border);
        }
        /* --- [修改 1 結束] --- */

        #drawing-svg { 
            width: 100%; height: 400px; border-radius: 8px;
            background-color: #ffffff; border: 1px solid var(--theme-border);
            cursor: grab;
        }
        #drawing-svg:active { cursor: grabbing; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th, td { border-bottom: 1px solid var(--theme-border); padding: 12px; text-align: left; }
        th { background-color: var(--theme-bg); color: var(--theme-text-primary); }
        td { color: var(--theme-text-secondary); }
        tr:last-child td { border-bottom: none; }
        .error { color: #ef4444; font-weight: bold; }

        /* --- SVG 樣式 --- */
        .grid-lines line {
            stroke: #475569; 
            stroke-width: 1;
            stroke-dasharray: 4 4; 
        }
        .grid-bubble { fill: var(--theme-surface); stroke: var(--theme-text-secondary); stroke-width: 1; }
        .grid-bubble-text { fill: var(--theme-text-primary); font-size: 10px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
        .beam-line { stroke: #d1d5db; stroke-width: 1; }
        .labeled-beam-line { stroke: #3b82f6; stroke-width: 2.5; }
        .special-beam-line { stroke: var(--theme-accent); stroke-width: 3; }
        .beam-label {
            fill: #1e293b; font-size: 9px; font-weight: 600;
            paint-order: stroke; stroke: #ffffff; stroke-width: 2px; stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>ETABS 梁自動編號工具</h1>
        <div class="controls">
            <label for="e2kFile">請選擇 ETABS .e2k 檔案:</label>
            <input type="file" id="e2kFile" accept=".e2k">
            
            <label for="storySelector">顯示樓層:</label>
            <select id="storySelector" onchange="handleStoryChange()" disabled></select>
            
            <label for="beamTypeSelector">顯示類型:</label>
            <select id="beamTypeSelector" onchange="handleStoryChange()" disabled>
                <option value="all">顯示全部</option>
                <option value="main">只顯示大梁</option>
                <option value="secondary">只顯示小梁</option>
            </select>
            <button class="btn-process" onclick="processE2k()">開始編號</button>
            <button class="btn-export" id="exportBtn" onclick="exportToExcel()" disabled>匯出成 Excel</button>
        </div>
        <div id="status"></div>
        <div id="output">
            <div id="drawing">
                <h3>結構平面圖 (<span id="plan-story-name">所有樓層合併</span>)</h3>
                <svg id="drawing-svg"></svg>
            </div>
            <div id="results-table">
                <h3>編號對照表 (<span id="table-story-name">所有樓層</span>)</h3>
                <table id="beam-table">
                    <thead>
                        <tr><th>樓層</th><th>原始 ETABS 編號</th><th>新編號</th></tr>
                        </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    
<script>
    // --- Global Variables ---
    let panZoomInstance = null;
    let fullProcessedBeams = [];
    let fullDrawableBeams = [];
    let availableStories = [];
    let gridData = {};
    let storyOrderInfo = {};
    const TOLERANCE = 0.1;

    // --- Main Control Function ---
    async function processE2k() {
        const fileInput = document.getElementById('e2kFile');
        const statusDiv = document.getElementById('status');
        const storySelector = document.getElementById('storySelector');
        const beamTypeSelector = document.getElementById('beamTypeSelector'); // [新增] 取得篩選器
        
        statusDiv.innerHTML = '';
        document.getElementById('drawing-svg').innerHTML = '';
        document.querySelector("#beam-table tbody").innerHTML = '';
        document.getElementById('exportBtn').disabled = true;
        storySelector.innerHTML = '';
        storySelector.disabled = true;
        beamTypeSelector.disabled = true; // [修改] 重設時禁用

        if (panZoomInstance) {
            panZoomInstance.destroy();
            panZoomInstance = null;
        }

        fullProcessedBeams = [];
        fullDrawableBeams = [];
        availableStories = [];
        gridData = {};

        if (fileInput.files.length === 0) {
            statusDiv.innerHTML = '<p class="error">Error: Please select an .e2k file first.</p>';
            return;
        }
        const file = fileInput.files[0];
        statusDiv.innerHTML = `<p>Reading file "${file.name}"...</p>`;
        let fileContent;
        try { fileContent = await file.text(); } catch (error) { statusDiv.innerHTML = `<p class="error">Failed to read file: ${error.message}</p>`; return; }
        
        try {
            const storySectionMatch = fileContent.match(/\$ STORIES - IN SEQUENCE FROM TOP([\s\S]*?)(?=\$|$)/i);
            if (!storySectionMatch) throw new Error("Could not find story definitions ($ STORIES) in the .e2k file.");
            const allStoryNames = storySectionMatch[1].trim().split('\n').map(line => line.match(/STORY\s+"([^"]+)"/i)?.[1]).filter(Boolean);
            if (allStoryNames.length === 0) throw new Error("Story definition block is empty.");
            
            availableStories = allStoryNames;
            populateStorySelector();
            
            statusDiv.innerHTML += `<p>Found ${availableStories.length} stories, parsing components...</p>`;
            gridData = parseGrids(fileContent);
            const joints = parseJoints(fileContent);
            
            let allBeamsAcrossStories = [];
            for (const story of availableStories) {
                const frames = parseFrames(fileContent, story);
                if (frames.length > 0) allBeamsAcrossStories.push(...frames);
            }
            if (allBeamsAcrossStories.length === 0) throw new Error("No qualifying beams found on any story.");
            
            fullDrawableBeams = allBeamsAcrossStories.map(f => ({ ...f, j1: joints[f.joint1], j2: joints[f.joint2] }));
            storyOrderInfo = availableStories.reduce((acc, story, index) => { acc[story] = index; return acc; }, {});
            
            const remainingBeams = [...allBeamsAcrossStories];

            const mainBeams = remainingBeams.filter(b => b.prop && !/^\d*SB/.test(b.prop.toUpperCase()));
            const secondaryBeams = remainingBeams.filter(b => b.prop && /^\d*SB/.test(b.prop.toUpperCase()));

            let allLabeledBeams = [];

            for (const story of availableStories) {
                const mainBeamsInStory = mainBeams.filter(b => b.story === story);
                const secondaryBeamsInStory = secondaryBeams.filter(b => b.story === story);

                if (mainBeamsInStory.length > 0) {
                    const labelComponentMap = generateLabelsForStory(mainBeamsInStory, joints, gridData);
                    labelComponentMap.forEach((components, beamKey) => {
                        const [name, joint1, joint2] = beamKey.split('|');
                        const originalBeam = mainBeamsInStory.find(b => b.name === name && b.joint1 === joint1 && b.joint2 === joint2);
                        if (!originalBeam) return;

                        const propUpper = originalBeam.prop.toUpperCase();
                        const prefix = components.isVertical
                            ? (propUpper.startsWith('FB') ? 'FB' : 'B')
                            : (propUpper.startsWith('FB') ? 'FGB' : 'G');
                        
                        const newLabel = `${prefix}${components.primaryGridName}${components.subGridMarker}-${components.serial}`;
                        allLabeledBeams.push({ ...originalBeam, newLabel });
                    });
                }

                if (secondaryBeamsInStory.length > 0) {
                    const secondaryBeamLabels = generateSecondaryBeamLabels(secondaryBeamsInStory, joints, gridData);
                     secondaryBeamLabels.forEach((value, key) => {
                        const [name, joint1, joint2] = key.split('|');
                        const originalBeam = secondaryBeamsInStory.find(b => b.name === name && b.joint1 === joint1 && b.joint2 === joint2);
                        if(originalBeam) {
                            allLabeledBeams.push({ ...originalBeam, newLabel: value.newLabel });
                        }
                    });
                }
            }
            
            let finalProcessedData = applySpecialPrefixRules(allLabeledBeams);
            finalProcessedData = finalProcessedData.filter(beam => beam.newLabel);
            
            finalProcessedData.sort((a, b) => {
                const storyCompare = storyOrderInfo[a.story] - storyOrderInfo[b.story];
                if (storyCompare !== 0) return storyCompare;
                
                const aIsSecondary = a.newLabel.startsWith('b');
                const bIsSecondary = b.newLabel.startsWith('b');

                if (aIsSecondary && !bIsSecondary) return 1;
                if (!aIsSecondary && bIsSecondary) return -1;

                return (a.newLabel || "").localeCompare(b.newLabel || "", "en", { numeric: true });
            });
            
            fullProcessedBeams = finalProcessedData;
            
            if (availableStories.includes('2F')) {
                storySelector.value = '2F';
            }
            handleStoryChange();

            statusDiv.innerHTML = `<p>Processing complete! ${fullProcessedBeams.length} items numbered.</p>`;
            if (fullProcessedBeams.length > 0) { exportBtn.disabled = false; }

        } catch (error) {
            statusDiv.innerHTML = `<p class="error">Processing failed: ${error.message}</p>`;
            console.error(error);
        }
    }
    
    // --- UI Interaction Functions ---
    function populateStorySelector() {
        const selector = document.getElementById('storySelector');
        selector.innerHTML = '<option value="all">All Floors</option>';
        availableStories.forEach(story => {
            const option = document.createElement('option');
            option.value = story;
            option.textContent = story;
            selector.appendChild(option);
        });
        selector.disabled = false;
        document.getElementById('beamTypeSelector').disabled = false; // [修改] 啟用梁類型篩選器
    }

    function handleStoryChange() {
        const storySelector = document.getElementById('storySelector');
        const beamTypeSelector = document.getElementById('beamTypeSelector');
        const selectedStory = storySelector.value;
        const selectedBeamType = beamTypeSelector.value; // [新增] 取得梁類型
        const svg = document.getElementById('drawing-svg');
        const tableBody = document.querySelector("#beam-table tbody");
        
        document.getElementById('plan-story-name').textContent = selectedStory === 'all' ? 'All Floors Combined' : selectedStory;
        document.getElementById('table-story-name').textContent = selectedStory === 'all' ? 'All Floors' : selectedStory;

        let beamsToDisplay = fullProcessedBeams;
        let backgroundBeams = fullDrawableBeams;

        // --- [修改] 全新的篩選邏輯 ---
        // 1. 先依樓層篩選
        if (selectedStory !== 'all') {
            beamsToDisplay = beamsToDisplay.filter(b => b.story === selectedStory);
            backgroundBeams = backgroundBeams.filter(b => b.story === selectedStory);
        }

        // 2. 再依梁類型篩選
        if (selectedBeamType === 'main') {
            beamsToDisplay = beamsToDisplay.filter(b => b.newLabel && !b.newLabel.startsWith('b'));
            backgroundBeams = backgroundBeams.filter(b => b.prop && !/^\d*SB/.test(b.prop.toUpperCase()));
        } else if (selectedBeamType === 'secondary') {
            beamsToDisplay = beamsToDisplay.filter(b => b.newLabel && b.newLabel.startsWith('b'));
            backgroundBeams = backgroundBeams.filter(b => b.prop && /^\d*SB/.test(b.prop.toUpperCase()));
        }
        // --- [修改結束] ---

        if (panZoomInstance) {
            panZoomInstance.destroy();
            panZoomInstance = null;
        }
        
        const labeledBeamsWithCoords = beamsToDisplay.map(beam => {
            const originalBeam = fullDrawableBeams.find(b => 
                b.name === beam.name && 
                b.story === beam.story &&
                b.joint1 === beam.joint1 &&
                b.joint2 === beam.joint2
            );
            return { ...beam, j1: originalBeam?.j1, j2: originalBeam?.j2 };
        });

        displayResults(labeledBeamsWithCoords, backgroundBeams, svg, tableBody, gridData);

        if (beamsToDisplay.length > 0) {
            panZoomInstance = svgPanZoom('#drawing-svg', {
                panEnabled: true, zoomEnabled: true, dblClickZoomEnabled: true,
                controlIconsEnabled: true, fit: true, center: true,
                minZoom: 0.5, maxZoom: 20
            });
        }
    }
    
    function summarizeFloors(floors, storyOrder) {
        if (!floors || floors.length === 0) return '';
        if (floors.length === 1) return floors[0];

        const sortedFloors = [...floors].sort((a, b) => storyOrder[a] - storyOrder[b]);
        const ranges = [];
        let rangeStart = sortedFloors[0];

        for (let i = 1; i < sortedFloors.length; i++) {
            const currentStoryOrder = storyOrder[sortedFloors[i]];
            const prevStoryOrder = storyOrder[sortedFloors[i-1]];

            if (currentStoryOrder !== prevStoryOrder + 1) {
                if (rangeStart === sortedFloors[i-1]) {
                    ranges.push(rangeStart);
                } else {
                    ranges.push(`${rangeStart}~${sortedFloors[i-1]}`);
                }
                rangeStart = sortedFloors[i];
            }
        }

        if (rangeStart === sortedFloors[sortedFloors.length - 1]) {
            ranges.push(rangeStart);
        } else {
            ranges.push(`${rangeStart}~${sortedFloors[sortedFloors.length - 1]}`);
        }
        return ranges.join(', ');
    }

    function summarizeProperties(floorProps, storyOrder) {
        if (!floorProps || floorProps.length === 0) return '';

        const propsToFloorsMap = new Map();
        for (const { story, prop } of floorProps) {
            if (!propsToFloorsMap.has(prop)) {
                propsToFloorsMap.set(prop, []);
            }
            propsToFloorsMap.get(prop).push(story);
        }

        const summaryParts = [];
        propsToFloorsMap.forEach((floors, prop) => {
            const floorRange = summarizeFloors(floors, storyOrder);
            summaryParts.push(`${floorRange}: ${prop}`);
        });

        summaryParts.sort((a, b) => {
            const firstStoryA = a.split(':')[0].trim().split('~')[0];
            const firstStoryB = b.split(':')[0].trim().split('~')[0];
            return storyOrder[firstStoryA] - storyOrder[firstStoryB];
        });

        return summaryParts.join('; ');
    }

    function exportToExcel() {
        if (fullProcessedBeams.length === 0) {
            alert("沒有可匯出的資料。");
            return;
        }

        const standardFloorGroups = createStandardFloorGroups();
        const preppedData = [];

        for (const group of standardFloorGroups) {
            const beamsInGroup = fullProcessedBeams.filter(b => group.includes(b.story));

            if (group.length === 1) {
                beamsInGroup.forEach(beam => {
                    preppedData.push({
                        floor: beam.story,
                        etabsLabel: beam.name,
                        newLabel: beam.newLabel,
                    });
                });
            } else {
                const mergedBeamsInGroup = new Map();
                beamsInGroup.forEach(beam => {
                    const key = beam.newLabel;
                    if (!mergedBeamsInGroup.has(key)) {
                        mergedBeamsInGroup.set(key, { name: beam.name, newLabel: beam.newLabel, floorProps: [] });
                    }
                    mergedBeamsInGroup.get(key).floorProps.push({ story: beam.story, prop: beam.prop });
                });

                mergedBeamsInGroup.forEach(mergedBeam => {
                    const floorString = summarizeFloors(group, storyOrderInfo);
                    preppedData.push({
                        floor: floorString,
                        etabsLabel: mergedBeam.name,
                        newLabel: mergedBeam.newLabel,
                    });
                });
            }
        }
        
        const mainBeamsData = [];
        const secondaryBeamsData = [];

        preppedData.forEach(item => {
            if (item.newLabel && item.newLabel.startsWith('b')) {
                secondaryBeamsData.push({
                    'ETABS編號': item.etabsLabel,
                    '編號': item.newLabel,
                    '樓層': item.floor
                });
            } else {
                 mainBeamsData.push({
                    'ETABS編號': item.etabsLabel,
                    '編號': item.newLabel,
                    '樓層': item.floor
                });
            }
        });

        const workbook = XLSX.utils.book_new();

        const mainWs = XLSX.utils.json_to_sheet(mainBeamsData);
        XLSX.utils.book_append_sheet(workbook, mainWs, "大梁");

        const secondaryWs = XLSX.utils.json_to_sheet(secondaryBeamsData);
        XLSX.utils.book_append_sheet(workbook, secondaryWs, "小梁");
        
        XLSX.writeFile(workbook, "ETABS_梁編號_分頁.xlsx");
    }
    
    // --- Drawing and Display Functions ---
    function displayResults(labeledBeams, allBeams, svg, tableBody, grids) {
        tableBody.innerHTML = '';
        labeledBeams.forEach(beam => {
            const row = tableBody.insertRow();
            row.insertCell(0).textContent = beam.story;
            row.insertCell(1).textContent = beam.name;
            row.insertCell(2).textContent = beam.newLabel;
            // [修改] 移除 Property 的顯示
        });

        const beamCoords = allBeams.flatMap(b => [b.j1, b.j2]).filter(Boolean);
        if (beamCoords.length === 0 && (!grids || grids.x.length === 0)) {
            svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="var(--theme-text-secondary)">No data to display</text>';
            return;
        }

        const gridCoordsX = grids.x ? grids.x.map(g => g.ordinate) : [];
        const gridCoordsY = grids.y ? grids.y.map(g => g.ordinate) : [];
        const allX = beamCoords.map(p => p.x).concat(gridCoordsX);
        const allY = beamCoords.map(p => p.y).concat(gridCoordsY);
        const minX = Math.min(...allX);
        const maxX = Math.max(...allX);
        const minY = Math.min(...allY);
        const maxY = Math.max(...allY);
        
        const padding = 60;
        const svgWidth = svg.clientWidth;
        const svgHeight = svg.clientHeight;
        const contentWidth = maxX - minX;
        const contentHeight = maxY - minY;
        
        let scale = Math.min((svgWidth - 2 * padding) / (contentWidth || 1), (svgHeight - 2 * padding) / (contentHeight || 1)) * 0.9;
        if (!isFinite(scale) || scale === 0) scale = 1;

        const transformX = (x) => padding + (x - minX) * scale;
        const transformY = (y) => svgHeight - padding - (y - minY) * scale;

        svg.innerHTML = '';

        const allDrawableBeams = allBeams.filter(b => b.j1 && b.j2);
        allDrawableBeams.forEach(beam => {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', transformX(beam.j1.x));
            line.setAttribute('y1', transformY(beam.j1.y));
            line.setAttribute('x2', transformX(beam.j2.x));
            line.setAttribute('y2', transformY(beam.j2.y));
            line.setAttribute('class', 'beam-line');
            svg.appendChild(line);
        });
        
        if (grids && grids.x && grids.y) {
            const gridGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            gridGroup.setAttribute('class', 'grid-lines');
            grids.x.forEach(gridLine => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', transformX(gridLine.ordinate));
                line.setAttribute('y1', padding);
                line.setAttribute('x2', transformX(gridLine.ordinate));
                line.setAttribute('y2', svgHeight - padding);
                gridGroup.appendChild(line);
            });
            grids.y.forEach(gridLine => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', padding);
                line.setAttribute('y1', transformY(gridLine.ordinate));
                line.setAttribute('x2', svgWidth - padding);
                line.setAttribute('y2', transformY(gridLine.ordinate));
                gridGroup.appendChild(line);
            });
            svg.appendChild(gridGroup);
            
            const bubbleRadius = 12;

    // --- Core Parsing Functions ---
    function parseGrids(content) {
        const grids = { x: [], y: [] };
        const gridTableSection = content.match(/TABLE:\s+"GRID DEFINITIONS - LINES"([\s\S]*?)(?=TABLE:|$)/);
        if (gridTableSection) {
            let currentGrid = {};
            const lines = gridTableSection[1].trim().split('\n');
            lines.forEach(line => {
                const trimmedLine = line.trim();
                if (trimmedLine === "") {
                    if (currentGrid.name && currentGrid.type && currentGrid.ordinate !== undefined) {
                        if (currentGrid.type.toUpperCase() === 'X') grids.x.push(currentGrid); else if (currentGrid.type.toUpperCase() === 'Y') grids.y.push(currentGrid);
                    }
                    currentGrid = {};
                } else {
                    const match = trimmedLine.match(/(\S+)\s*=\s*"?([^"]*)"?/);
                    if (match) { 
                        const [, key, value] = match; 
                        if (key === 'GridID') currentGrid.name = value; 
                        if (key === 'GridType') currentGrid.type = value; 
                        if (key === 'Ordinate') currentGrid.ordinate = parseFloat(value);
                        if (key === 'BubbleLoc') currentGrid.bubbleLoc = value;
                    }
                }
            });
            if (currentGrid.name) { if (currentGrid.type.toUpperCase() === 'X') grids.x.push(currentGrid); else if (currentGrid.type.toUpperCase() === 'Y') grids.y.push(currentGrid); }
        }
        if (grids.x.length === 0 && grids.y.length === 0) {
            const gridDollarSection = content.match(/\$ GRIDS([\s\S]*?)(?=\$|$)/);
            if (gridDollarSection) {
                const lines = gridDollarSection[1].trim().split('\n');
                lines.forEach(line => {
                    const match = line.match(/LABEL\s+"([^"]+)"\s+DIR\s+"(X|Y)"\s+COORD\s+([-\d\.E]+)/i);
                    if (match) { const [, name, type, ordinate] = match; const gridInfo = { name, type, ordinate: parseFloat(ordinate) }; if (type.toUpperCase() === 'X') grids.x.push(gridInfo); else if (type.toUpperCase() === 'Y') grids.y.push(gridInfo); }
                });
            }
        }
        if (grids.x.length === 0 && grids.y.length === 0) { throw new Error("Could not find grid definitions."); }
        grids.x = [...new Map(grids.x.map(item => [item.name, item])).values()].sort((a, b) => a.ordinate - b.ordinate);
        grids.y = [...new Map(grids.y.map(item => [item.name, item])).values()].sort((a, b) => a.ordinate - b.ordinate);
        return grids;
    }

    function parseJoints(content) {
        const joints = {};
        const sciNotationRegex = /"([^"]+)"\s+([-\d\.E]+)\s+([-\d\.E]+)/;
        const pointRegex = /^POINT\s+"([^"]+)"\s+([-\d\.E]+)\s+([-\d\.E]+)/;
        const nameRegex = /NAME\s*=\s*(\S+)\s*X\s*=\s*([-\d\.E]+)\s*Y\s*=\s*([-\d\.E]+)/;

        const jointTableSection = content.match(/TABLE:\s+"JOINT COORDINATES"([\s\S]*?)(?=TABLE:|$)/);
        if (jointTableSection) {
            const lines = jointTableSection[1].trim().split('\n');
            lines.forEach(line => {
                if (line.trim().startsWith('JOINT')) return;
                const match = line.trim().match(sciNotationRegex);
                if (match) {
                    joints[match[1]] = { x: parseFloat(match[2]), y: parseFloat(match[3]) };
                }
            });
        }
        if (Object.keys(joints).length === 0) {
            const lines = content.split('\n');
            lines.forEach(line => {
                const match = line.trim().match(pointRegex);
                if (match) {
                    joints[match[1]] = { x: parseFloat(match[2]), y: parseFloat(match[3]) };
                }
            });
        }
        if (Object.keys(joints).length === 0) {
            const jointDollarSection = content.match(/\$ JOINTS([\s\S]*?)(?=\$|$)/s);
            if (jointDollarSection) {
                const lines = jointDollarSection[1].trim().split('\n');
                lines.forEach(line => {
                    const match = line.match(nameRegex);
                    if (match) {
                        joints[match[1]] = { x: parseFloat(match[2]), y: parseFloat(match[3]) };
                    }
                });
            }
        }
        if (Object.keys(joints).length === 0) { throw new Error("Could not find joint coordinate definitions."); }
        return joints;
    }

    function parseFrames(content, story) {
        const frames = [];
        const isBeamProp = (propName) => {
            if (!propName) return false;
            const p = propName.toUpperCase();
            const isMainBeam = /^\d*B/.test(p);
            const isSecondaryBeam = /^\d*SB/.test(p);
            return isMainBeam || isSecondaryBeam || p.startsWith('FB') || p.startsWith('WB') || p.startsWith('FWB');
        };

        const frameTableSection = content.match(/TABLE:\s+"CONNECTIVITY - FRAME"([\s\S]*?)(?=TABLE:|$)/);
        const frameAssignSection = content.match(/TABLE:\s+"FRAME ASSIGNS - SECTION"([\s\S]*?)(?=TABLE:|$)/);
        if (frameTableSection && frameAssignSection) {
            const connectivityLines = frameTableSection[1].trim().split('\n'); const assignLines = frameAssignSection[1].trim().split('\n'); const frameProperties = new Map();
            assignLines.forEach(line => { const match = line.trim().match(/^"([^"]+)"\s+"([^"]+)"\s+"([^"]+)"/); if (match && match[2] === story) { frameProperties.set(match[1], match[3]); } });
            connectivityLines.forEach(line => { const match = line.trim().match(/^"([^"]+)"\s+"([^"]+)"\s+"([^"]+)"/); if (match) { const [, name, joint1, joint2] = match; const propName = frameProperties.get(name); if (isBeamProp(propName)) { frames.push({ name, prop: propName, joint1, joint2, story }); } } });
        }
        if (frames.length === 0) {
            const lineConnectivitySection = content.match(/\$ LINE CONNECTIVITIES([\s\S]*?)(?=\$|$)/i); const lineAssignsSection = content.match(/\$ LINE ASSIGNS([\s\S]*?)(?=\$|$)/i);
            if (lineConnectivitySection && lineAssignsSection) {
                const connectLines = lineConnectivitySection[1].trim().split('\n'); const assignLines = lineAssignsSection[1].trim().split('\n'); const beamAssigns = new Map();
                assignLines.forEach(line => { const assignMatch = line.match(new RegExp(`LINEASSIGN\\s+"([^"]+)"\\s+"${story}"\\s+SECTION\\s+"([^"]+)"`, 'i')); if (assignMatch) { const [, name, propName] = assignMatch; if (isBeamProp(propName)) { beamAssigns.set(name, propName); } } });
                connectLines.forEach(line => { const connMatch = line.match(/LINE\s+"([^"]+)"\s+BEAM\s+"([^"]+)"\s+"([^"]+)"/i); if (connMatch) { const [, name, joint1, joint2] = connMatch; if (beamAssigns.has(name)) { frames.push({ name, prop: beamAssigns.get(name), joint1, joint2, story }); } } });
            }
        }
        return frames;
    }

    // --- Core Numbering Logic Functions ---
    function findClosestGrid(coordinate, grids) {
        if (!grids || grids.length === 0) return null;
        return grids.reduce((closest, current) => {
            const closestDiff = Math.abs(coordinate - closest.ordinate);
            const currentDiff = Math.abs(coordinate - current.ordinate);
            return currentDiff < closestDiff ? current : closest;
        });
    }
    
    function generateLabelsForStory(beamsInStory, joints, grids) {
        const labelComponentMap = new Map();
        const beamsWithCoords = beamsInStory.map(b => {
            const j1 = joints[b.joint1], j2 = joints[b.joint2];
            if (!j1 || !j2) return null;
            return { ...b, j1, j2,
                centerX: (j1.x + j2.x) / 2, centerY: (j1.y + j2.y) / 2,
                minX: Math.min(j1.x, j2.x), maxX: Math.max(j1.x, j2.x),
                minY: Math.min(j1.y, j2.y), maxY: Math.max(j1.y, j2.y),
                isHorizontal: Math.abs(j1.y - j2.y) < TOLERANCE,
                isVertical: Math.abs(j1.x - j2.x) < TOLERANCE
            };
        }).filter(Boolean);

        const processedSegments = new Set();
        beamsWithCoords.forEach(startSegment => {
            const segmentKey = `${startSegment.name}|${startSegment.joint1}|${startSegment.joint2}`;
            if (processedSegments.has(segmentKey) || (!startSegment.isHorizontal && !startSegment.isVertical)) return;

            const chain = beamsWithCoords.filter(otherSegment => otherSegment.name === startSegment.name);
            chain.forEach(s => processedSegments.add(`${s.name}|${s.joint1}|${s.joint2}`));
            
            if (startSegment.isHorizontal) { chain.sort((a, b) => a.minX - b.minX); } 
            else { chain.sort((a, b) => a.minY - b.minY); }

            const firstInChain = chain[0];
            if (firstInChain.isVertical) {
                const onGrid = findClosestGrid(firstInChain.centerX, grids.x);
                const prevGridX = grids.x.slice().reverse().find(g => g.ordinate < firstInChain.centerX);
                if (Math.abs(firstInChain.centerX - onGrid.ordinate) < TOLERANCE) { // On grid
                    chain.forEach(segment => {
                        const endGridY = findClosestGrid(segment.maxY, grids.y);
                        const serial = grids.y.findIndex(g => g.name === endGridY.name);
                        if (serial !== -1) {
                            labelComponentMap.set(`${segment.name}|${segment.joint1}|${segment.joint2}`, { isVertical: true, primaryGridName: onGrid.name, subGridMarker: '', serial });
                        }
                    });
                } else if (prevGridX) { // Off grid
                    const nextGridX = findClosestGrid(firstInChain.centerX, grids.x);
                    const uniqueXCoords = [...new Set(beamsWithCoords.filter(b => b.isVertical && b.centerX > prevGridX.ordinate && b.centerX < nextGridX.ordinate).map(b => b.centerX.toFixed(2)))].sort((a,b) => parseFloat(a) - parseFloat(b));
                    const rank = uniqueXCoords.indexOf(firstInChain.centerX.toFixed(2));
                    const subGridMarker = "'".repeat(rank + 1);
                    chain.forEach(segment => {
                        const endGridY = findClosestGrid(segment.maxY, grids.y);
                        const serial = grids.y.findIndex(g => g.name === endGridY.name);
                        if (serial !== -1) {
                            labelComponentMap.set(`${segment.name}|${segment.joint1}|${segment.joint2}`, { isVertical: true, primaryGridName: prevGridX.name, subGridMarker, serial });
                        }
                    });
                }
            } else if (firstInChain.isHorizontal) {
                const onGrid = findClosestGrid(firstInChain.centerY, grids.y);
                const prevGridY = grids.y.slice().reverse().find(g => g.ordinate < firstInChain.centerY);
                if (Math.abs(firstInChain.centerY - onGrid.ordinate) < TOLERANCE) { // On grid
                    chain.forEach(segment => {
                        const startGridX = findClosestGrid(segment.minX, grids.x);
                        if (!startGridX) return;
                        const serial = parseInt(startGridX.name, 10);
                        if (!isNaN(serial)) {
                            labelComponentMap.set(`${segment.name}|${segment.joint1}|${segment.joint2}`, { isVertical: false, primaryGridName: onGrid.name, subGridMarker: '', serial });
                        }
                    });
                } else if (prevGridY) { // Off grid
                    const nextGridY = findClosestGrid(firstInChain.centerY, grids.y);
                    const uniqueYCoords = [...new Set(beamsWithCoords.filter(b => b.isHorizontal && b.centerY > prevGridY.ordinate && b.centerY < nextGridY.ordinate).map(b => b.centerY.toFixed(2)))].sort((a,b) => parseFloat(a) - parseFloat(b));
                    const rank = uniqueYCoords.indexOf(firstInChain.centerY.toFixed(2));
                    const subGridMarker = "'".repeat(rank + 1);
                    chain.forEach(segment => {
                        const startGridX = findClosestGrid(segment.minX, grids.x);
                        if (!startGridX) return;
                        const serial = parseInt(startGridX.name, 10);
                        if (!isNaN(serial)) {
                            labelComponentMap.set(`${segment.name}|${segment.joint1}|${segment.joint2}`, { isVertical: false, primaryGridName: prevGridY.name, subGridMarker, serial });
                        }
                    });
                }
            }
        });
        return labelComponentMap;
    }

    function generateSecondaryBeamLabels(beamsInStory, joints, grids) {
        const sbLabels = new Map();
        const beamsWithData = beamsInStory.map(b => {
            const j1_coords = joints[b.joint1], j2_coords = joints[b.joint2];
            if (!j1_coords || !j2_coords) return null;
            const isHorizontal = Math.abs(j1_coords.y - j2_coords.y) < TOLERANCE;
            const isVertical = Math.abs(j1_coords.x - j2_coords.x) < TOLERANCE;
            let startJointName = b.joint1, endJointName = b.joint2;
            if (isHorizontal && j1_coords.x > j2_coords.x) { [startJointName, endJointName] = [b.joint2, b.joint1]; }
            if (isVertical && j1_coords.y > j2_coords.y) { [startJointName, endJointName] = [b.joint2, b.joint1]; }
            return { ...b, startJointName, endJointName, isHorizontal, isVertical };
        }).filter(Boolean);

        const processed = new Set();
        let counter = 1;
        const beamGroups = [
            beamsWithData.filter(b => b.isHorizontal).sort((a,b) => joints[a.startJointName].y - joints[b.startJointName].y || joints[a.startJointName].x - joints[b.startJointName].x),
            beamsWithData.filter(b => b.isVertical).sort((a,b) => joints[a.startJointName].x - joints[b.startJointName].x || joints[a.startJointName].y - joints[b.startJointName].y)
        ];

        let isVerticalRun = false;
        beamGroups.forEach(group => {
            if (isVerticalRun && counter > 1) {
                const lastNum = counter - 1;
                counter = (lastNum % 10 === 0) ? lastNum + 1 : Math.ceil(lastNum / 10) * 10 + 1;
            }
            for (const startBeam of group) {
                const startKey = `${startBeam.name}|${startBeam.joint1}|${startBeam.joint2}`;
                if (processed.has(startKey)) continue;

                let chain = [startBeam];
                processed.add(startKey);
                let currentLink = startBeam;

                while (true) {
                    const nextLink = group.find(b => {
                        const nextKey = `${b.name}|${b.joint1}|${b.joint2}`;
                        return !processed.has(nextKey) && b.startJointName === currentLink.endJointName;
                    });
                    if (nextLink) {
                        chain.push(nextLink);
                        processed.add(`${nextLink.name}|${nextLink.joint1}|${nextLink.joint2}`);
                        currentLink = nextLink;
                    } else { break; }
                }
                if (chain.length > 1) {
                    chain.forEach((beam, index) => {
                        sbLabels.set(`${beam.name}|${beam.joint1}|${beam.joint2}`, { newLabel: `b${counter}-${index + 1}` });
                    });
                } else {
                    sbLabels.set(`${chain[0].name}|${chain[0].joint1}|${chain[0].joint2}`, { newLabel: `b${counter}` });
                }
                counter++;
            }
            isVerticalRun = true;
        });
        return sbLabels;
    }

    function applySpecialPrefixRules(allBeams) {
        const processPrefix = (prefix) => {
            const targetBeams = allBeams.filter(b => b.prop && b.prop.toUpperCase().startsWith(prefix)); if (targetBeams.length === 0) return null;
            const uniqueProps = [...new Set(targetBeams.map(b => b.prop))];
            const propRanks = uniqueProps.map(prop => { const match = prop.match(/(\d+)[xX](\d+)/); if (match) { return { propName: prop, area: parseInt(match[1], 10) * parseInt(match[2], 10) }; } return { propName: prop, area: Infinity }; }).sort((a, b) => a.area - b.area);
            const propToLabelMap = new Map(); propRanks.forEach((propInfo, index) => { propToLabelMap.set(propInfo.propName, `${prefix}${index + 1}`); }); return propToLabelMap;
        };
        const wbLabelMap = processPrefix('WB'); const fwbLabelMap = processPrefix('FWB');
        return allBeams.map(beam => {
            if (wbLabelMap && wbLabelMap.has(beam.prop)) { return { ...beam, newLabel: wbLabelMap.get(beam.prop) }; }
            if (fwbLabelMap && fwbLabelMap.has(beam.prop)) { return { ...beam, newLabel: fwbLabelMap.get(beam.prop) }; }
            return beam;
        });
    }

    /**
     * 為指定樓層產生一個代表其梁配置的唯一“指紋”
     */
    function generateFloorFingerprint(story, allBeams, precision = 2) {
        const beamsOnStory = allBeams.filter(b => b.story === story);
        if (beamsOnStory.length === 0) {
            return '';
        }

        const beamSignatures = beamsOnStory.map(beam => {
            if (!beam.j1 || !beam.j2) return '';

            const x1 = beam.j1.x.toFixed(precision);
            const y1 = beam.j1.y.toFixed(precision);
            const x2 = beam.j2.x.toFixed(precision);
            const y2 = beam.j2.y.toFixed(precision);

            const point1Str = `${x1},${y1}`;
            const point2Str = `${x2},${y2}`;

            return point1Str < point2Str ? `${point1Str}|${point2Str}` : `${point2Str}|${point1Str}`;
        }).filter(Boolean);

        return beamSignatures.sort().join(';');
    }

    /**
     * 根據平面配置指紋，識別並組合連續的標準層區塊
     */
    function createStandardFloorGroups() {
        if (availableStories.length === 0) return [];

        const sortedStories = [...availableStories].sort((a, b) => storyOrderInfo[a] - storyOrderInfo[b]);

        const fingerprints = sortedStories.map(story => ({
            story,
            fingerprint: generateFloorFingerprint(story, fullDrawableBeams, 2)
        }));

        if (fingerprints.length === 0) return [];

        const groups = [];
        let currentGroup = [fingerprints[0].story];

        for (let i = 1; i < fingerprints.length; i++) {
            if (fingerprints[i].fingerprint === fingerprints[i-1].fingerprint && fingerprints[i].fingerprint !== '') {
                currentGroup.push(fingerprints[i].story);
            } else {
                groups.push(currentGroup);
                currentGroup = [fingerprints[i].story];
            }
        }
        groups.push(currentGroup);

        return groups;
    }

    function exportToExcel() {
        if (fullProcessedBeams.length === 0) {
            alert("沒有可匯出的資料。");
            return;
        }

        const standardFloorGroups = createStandardFloorGroups();
        const preppedData = [];

        for (const group of standardFloorGroups) {
            const beamsInGroup = fullProcessedBeams.filter(b => group.includes(b.story));

            if (group.length === 1) {
                beamsInGroup.forEach(beam => {
                    preppedData.push({
                        floor: beam.story,
                        etabsLabel: beam.name,
                        newLabel: beam.newLabel,
                    });
                });
            } else {
                const mergedBeamsInGroup = new Map();
                beamsInGroup.forEach(beam => {
                    const key = beam.newLabel;
                    if (!mergedBeamsInGroup.has(key)) {
                        mergedBeamsInGroup.set(key, { name: beam.name, newLabel: beam.newLabel, floorProps: [] });
                    }
                    mergedBeamsInGroup.get(key).floorProps.push({ story: beam.story, prop: beam.prop });
                });

                mergedBeamsInGroup.forEach(mergedBeam => {
                    const floorString = summarizeFloors(group, storyOrderInfo);
                    preppedData.push({
                        floor: floorString,
                        etabsLabel: mergedBeam.name,
                        newLabel: mergedBeam.newLabel,
                    });
                });
            }
        }
        
        const mainBeamsData = [];
        const secondaryBeamsData = [];

        preppedData.forEach(item => {
            if (item.newLabel && item.newLabel.startsWith('b')) {
                secondaryBeamsData.push({
                    'ETABS編號': item.etabsLabel,
                    '編號': item.newLabel,
                    '樓層': item.floor
                });
            } else {
                 mainBeamsData.push({
                    'ETABS編號': item.etabsLabel,
                    '編號': item.newLabel,
                    '樓層': item.floor
                });
            }
        });

        const workbook = XLSX.utils.book_new();

        const mainWs = XLSX.utils.json_to_sheet(mainBeamsData);
        XLSX.utils.book_append_sheet(workbook, mainWs, "大梁");

        const secondaryWs = XLSX.utils.json_to_sheet(secondaryBeamsData);
        XLSX.utils.book_append_sheet(workbook, secondaryWs, "小梁");
        
        XLSX.writeFile(workbook, "ETABS_梁編號_分頁.xlsx");
    }

</script>
